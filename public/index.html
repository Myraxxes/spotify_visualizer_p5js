<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Visualizer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="sketch.js" defer></script>
  <script src="main.js" defer></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #eee;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* LEFT PANEL */
    #left-panel {
      width: 400px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background-color: #1a1a1a;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    /* SUBTITLE */
    #subtitle {
      margin-top: 5px;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.3;
    }

    /* SEARCH */
    #search-container {
      display: flex;
      gap: 10px;
    }

    #search-input {
      flex-grow: 1;
      padding: 8px 12px;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      outline: none;
    }

    #search-button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      background-color: #f48fb1;
      color: white;
      border: none;
      border-radius: 4px;
    }

    #search-button:hover {
      background-color: #ec407a;
    }

    /* MATCHES */
    #matches-container {
      max-height: 150px;
      overflow-y: auto;
      background-color: #222;
      padding: 10px;
      border-radius: 6px;
    }

    .match-item {
      padding: 6px;
      cursor: pointer;
      border-radius: 4px;
    }

    .match-item:hover {
      background-color: #333;
    }

    /* SONG INFO */
    #song-details {
      display: flex;
      gap: 15px;
      align-items: flex-start;
    }

    #cover-image {
      width: 120px;
      height: 120px;
      background-color: #333;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
    }

    #song-info h2 {
      margin: 0 0 6px 0;
      font-size: 1.2rem;
    }

    #song-info p {
      margin: 4px 0;
      font-size: 0.9rem;
      color: #ccc;
    }

    /* RIGHT PANEL */
    #right-panel {
      flex-grow: 1;
      background-color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    /* CANVAS */
    #canvas-wrapper {
      width: 500px;
      height: 500px;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #000;
      position: relative;
    }
  </style>
</head>

<body>

  <div id="left-panel">
    <h1>Spotify Art Visualizer</h1>

    <p id="subtitle">
      Search for a song and generate animated visual effects from its album art. <br>
      Each track creates a unique “seed” from its name, which controls glitch movement, color, and distortion patterns.
    </p>

    <div id="search-container">
      <input type="text" id="search-input" placeholder="Search for a song" />
      <button id="search-button">Search</button>
    </div>

    <div id="matches-container" hidden></div>

    <div id="song-details" hidden>
      <img id="cover-image" src="" alt="Album cover" />

      <div id="song-info">
        <h2 id="song-title">Song Title</h2>
        <p id="artist-name">Artist Name</p>
        <p id="album-name"></p>
        <p id="song-duration"></p>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div id="canvas-wrapper"></div>
  </div>

</body>
</html>
